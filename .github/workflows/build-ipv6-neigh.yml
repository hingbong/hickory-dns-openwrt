name: Build ipv6-neigh (aarch64)

on:
  workflow_dispatch:

jobs:
  build-aarch64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross
        run: |
          curl -fsSL https://github.com/cross-rs/cross/releases/latest/download/cross-x86_64-unknown-linux-gnu.tar.gz \
            | sudo tar xz -C /usr/local/bin

      - name: Build ipv6-neigh for aarch64
        working-directory: ipv6-neigh
        run: |
          cross build --release --target aarch64-unknown-linux-musl

      - name: Check binary
        run: |
          file ipv6-neigh/target/aarch64-unknown-linux-musl/release/ipv6-neigh
          ls -lh ipv6-neigh/target/aarch64-unknown-linux-musl/release/ipv6-neigh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipv6-neigh-aarch64
          path: ipv6-neigh/target/aarch64-unknown-linux-musl/release/ipv6-neigh
